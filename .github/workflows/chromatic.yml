name: Chromatic
on:
    push:
      branches: [main]
    pull_request:
      branches: [main]
jobs:
    check:
      runs-on: ubuntu-latest
      outputs:
        run: ${{ steps.match.outputs.run }}
      steps:
        - id: match
          env:
            MSG: ${{ github.event_name == 'push' && github.event.head_commit.message || github.event.pull_request.title }}
          run: |
            if printf '%s' "$MSG" | grep -qE '^feat\([^)]*story[^)]*\)'; then
              echo "run=true" >> "$GITHUB_OUTPUT"
            else
              echo "run=false" >> "$GITHUB_OUTPUT"
            fi
    chromatic:
      needs: check
      if: needs.check.outputs.run == 'true'
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v4
          with:
            fetch-depth: 0
        - uses: pnpm/action-setup@v4
        - uses: actions/setup-node@v4
          with:
            node-version: 20
            cache: pnpm
        - run: pnpm install --frozen-lockfile
        - uses: chromaui/action@latest
          with:
            projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
            workingDir: packages/react-components
            exitZeroOnChanges: true